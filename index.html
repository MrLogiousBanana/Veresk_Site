<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Parallax</title>
    <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script>
        window.onload = function() {
            // Проверка, что Three.js загрузился
            if (typeof THREE === 'undefined') {
                document.body.innerHTML = "<h1 style='color:white'>Ошибка: Three.js не загружен!</h1>";
                return;
            }

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Добавляем свет (на всякий случай)
            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);

            // Создаем слои (просто цветные меши для теста)
            const layers = [];

            function createLayer(color, z, size, factor) {
                const geo = new THREE.PlaneGeometry(size.x, size.y);
                const mat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.z = z;
                scene.add(mesh);
                layers.push({ mesh, factor });
            }

            // Задний фон (Красный)
            createLayer(0xff0000, -2, {x: 8, y: 5}, 0.05);
            // Средний слой (Зеленый)
            createLayer(0x00ff00, 0, {x: 2, y: 2}, 0.2);
            // Передний слой (Синий)
            createLayer(0x0000ff, 2, {x: 1, y: 0.5}, 0.5);

            let mouseX = 0, mouseY = 0;

            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Поддержка Quest (наклон)
            window.addEventListener('deviceorientation', (e) => {
                if(e.gamma) {
                    mouseX = e.gamma / 30;
                    mouseY = (e.beta - 90) / 30;
                }
            });

            function animate() {
                requestAnimationFrame(animate);
                layers.forEach(l => {
                    const targetX = mouseX * l.factor * 5;
                    const targetY = mouseY * l.factor * 5;
                    l.mesh.position.x += (targetX - l.mesh.position.x) * 0.1;
                    l.mesh.position.y += (targetY - l.mesh.position.y) * 0.1;
                });
                renderer.render(scene, camera);
            }
            animate();
            console.log("Debug: Render started");
        };
    </script>
</body>
</html>
