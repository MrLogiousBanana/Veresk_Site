<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quest Fix</title>
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        #error-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; background: rgba(0,0,0,0.8); color: white; 
            justify-content: center; align-items: center; text-align: center;
        }
    </script>
</head>
<body>
    <div id="error-overlay"><h1>Ошибка: Библиотека всё еще не грузится</h1></div>

    <script>
        // Проверка загрузки
        if (typeof THREE === 'undefined') {
            document.getElementById('error-overlay').style.display = 'flex';
        } else {
            initScene();
        }

        function initScene() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Создаем слои
            const layers = [];
            const loader = new THREE.TextureLoader();

            // ФОН (Картинка)
            const bgMat = new THREE.MeshBasicMaterial({ color: 0x444444 });
            // Пробуем загрузить твою картинку
            loader.load('assets/hero-bg/4.jpg', 
                (t) => { bgMat.map = t; bgMat.needsUpdate = true; },
                undefined,
                () => { console.log("Файл 4.jpg не найден, использую заглушку"); }
            );
            const bg = new THREE.Mesh(new THREE.PlaneGeometry(10, 6), bgMat);
            bg.position.z = -2;
            scene.add(bg);
            layers.push({ m: bg, f: 0.05 });

            // СРЕДНИЙ СЛОЙ (Зеленые кружки)
            const group = new THREE.Group();
            for(let i=0; i<10; i++) {
                const c = new THREE.Mesh(new THREE.CircleGeometry(0.2, 32), new THREE.MeshBasicMaterial({color: 0x00ff88}));
                c.position.set(Math.random()*6-3, Math.random()*4-2, 0);
                group.add(c);
            }
            group.position.z = 0;
            scene.add(group);
            layers.push({ m: group, f: 0.2 });

            // ПЕРЕДНИЙ СЛОЙ (Кнопки)
            const btn = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.4), new THREE.MeshBasicMaterial({color: 0x0088ff}));
            btn.position.z = 2;
            scene.add(btn);
            layers.push({ m: btn, f: 0.5 });

            let mx = 0, my = 0;
            window.addEventListener('mousemove', (e) => {
                mx = (e.clientX / window.innerWidth) * 2 - 1;
                my = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Наклон для Квеста
            window.addEventListener('deviceorientation', (e) => {
                if (e.gamma) {
                    mx = e.gamma / 40;
                    my = (e.beta - 90) / 40;
                }
            });

            function animate() {
                requestAnimationFrame(animate);
                layers.forEach(l => {
                    l.m.position.x += (mx * l.f * 4 - l.m.position.x) * 0.1;
                    l.m.position.y += (my * l.f * 4 - l.m.position.y) * 0.1;
                });
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
