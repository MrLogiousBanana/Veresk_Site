<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>body { margin: 0; background: #222; overflow: hidden; }</style>
</head>
<body>
    <script>
        let scene, camera, renderer, layers = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333); // Серый фон вместо черного

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();

            // 1. ЗАДНИЙ СЛОЙ
            // Добавим сначала просто красный цвет, чтобы увидеть слой даже БЕЗ картинки
            const bgGeo = new THREE.PlaneGeometry(8, 5);
            const bgMat = new THREE.MeshBasicMaterial({ color: 0x440000 }); // Темно-красный
            
            loader.load('assets/hero-bg/4.jpg', 
                (texture) => { bgMat.map = texture; bgMat.color.set(0xffffff); bgMat.needsUpdate = true; },
                undefined,
                (err) => { console.error("Картинка не нашлась по пути assets/hero-bg/4.jpg"); }
            );

            const bgMesh = new THREE.Mesh(bgGeo, bgMat);
            bgMesh.position.z = -1;
            scene.add(bgMesh);
            layers.push({ mesh: bgMesh, factor: 0.05 });

            // 2. СРЕДНИЙ СЛОЙ (Кружочки)
            const circlesGroup = new THREE.Group();
            for(let i = 0; i < 10; i++) {
                const circle = new THREE.Mesh(
                    new THREE.CircleGeometry(0.15, 32),
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 }) // Зеленые кружки
                );
                circle.position.set(Math.random()*4 - 2, Math.random()*2 - 1, 0);
                circlesGroup.add(circle);
            }
            circlesGroup.position.z = 1;
            scene.add(circlesGroup);
            layers.push({ mesh: circlesGroup, factor: 0.2 });

            // 3. ПЕРЕДНИЙ СЛОЙ (Кнопки)
            const uiGroup = new THREE.Group();
            const btnMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(1, 0.4),
                new THREE.MeshBasicMaterial({ color: 0x00aaff }) // Голубая кнопка
            );
            uiGroup.add(btnMesh);
            uiGroup.position.z = 2;
            scene.add(uiGroup);
            layers.push({ mesh: uiGroup, factor: 0.5 });

            console.log("Сцена инициализирована");
        }

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            layers.forEach(l => {
                l.mesh.position.x += (mouseX * l.factor - l.mesh.position.x) * 0.1;
                l.mesh.position.y += (mouseY * l.factor - l.mesh.position.y) * 0.1;
            });
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
