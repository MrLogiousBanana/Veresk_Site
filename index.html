<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Quest WebDepth Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #webxr-button { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; z-index: 100; }
    </style>
</head>
<body>
    <script>
        let scene, camera, renderer, plane;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // Включаем поддержку XR
            document.body.appendChild(renderer.domElement);

            // Создаем "карточку" поста
            const geometry = new THREE.PlaneGeometry(1.5, 1);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                map: new THREE.TextureLoader().load('https://picsum.photos/600/400') // Заглушка фото
            });
            plane = new THREE.Mesh(geometry, material);
            scene.add(plane);

            // Добавляем свет
            const light = new THREE.AmbientLight(0xffffff, 1);
            scene.add(light);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            // Магия параллакса:
            // В XR режиме camera.position автоматически обновляется данными шлема
            if (renderer.xr.isPresenting) {
                // Слегка поворачиваем плоскость вслед за головой, создавая иллюзию объема
                plane.rotation.y = camera.position.x * 0.1;
                plane.rotation.x = -camera.position.y * 0.1;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
